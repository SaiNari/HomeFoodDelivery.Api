<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Analytics & Reviews - OotaBox Kitchen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Chart.js for the Graph -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>if (!localStorage.getItem('userId')) window.location.href = '/index.html';</script>
</head>
<body class="bg-light pb-5">

    <nav class="navbar navbar-light bg-white shadow-sm mb-4 sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <button class="btn btn-link text-dark text-decoration-none px-0 fw-bold" onclick="window.location.href='dashboard.html'">
                <i class="fa-solid fa-arrow-left me-1"></i> Back to Kitchen
            </button>
            <span class="navbar-brand fw-bold mx-auto">Performance & Reviews</span>
            <div style="width: 80px;"></div>
        </div>
    </nav>

    <div class="container" style="max-width: 900px;">

        <!-- Top KPI Cards -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-4">
                <div class="card border-0 shadow-sm rounded-4 h-100 bg-white">
                    <div class="card-body p-3 text-center">
                        <div class="text-success mb-1"><i class="fa-solid fa-indian-rupee-sign fs-3"></i></div>
                        <h4 class="fw-bold mb-0 text-dark" id="totalRevenue">₹0</h4>
                        <p class="text-muted small mb-0">Total Revenue</p>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-4">
                <div class="card border-0 shadow-sm rounded-4 h-100 bg-white">
                    <div class="card-body p-3 text-center">
                        <div class="text-primary mb-1"><i class="fa-solid fa-bag-shopping fs-3"></i></div>
                        <h4 class="fw-bold mb-0 text-dark" id="totalOrders">0</h4>
                        <p class="text-muted small mb-0">Portions Sold</p>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="card border-0 shadow-sm rounded-4 h-100 bg-dark text-white">
                    <div class="card-body p-3 text-center d-flex flex-column justify-content-center">
                        <div class="text-warning mb-1"><i class="fa-solid fa-star fs-3"></i></div>
                        <h4 class="fw-bold mb-0" id="averageRating">--</h4>
                        <p class="text-white-50 small mb-0">Average Rating</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- Left Column: The Graph -->
            <div class="col-md-7 mb-4">
                <div class="card border-0 shadow-sm rounded-4 h-100">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-3"><i class="fa-solid fa-chart-pie text-primary me-2"></i>Sales by Dish</h5>
                        <p class="text-muted small mb-4">See which items are the most popular with your customers.</p>
                        <div style="position: relative; height:300px; width:100%">
                            <canvas id="salesChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Customer Feedback -->
            <div class="col-md-5 mb-4">
                <div class="card border-0 shadow-sm rounded-4 h-100 border-top border-warning border-4">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-3"><i class="fa-solid fa-comments text-warning me-2"></i>Customer Feedback</h5>

                        <div id="reviewsList" class="d-flex flex-column gap-3 overflow-auto" style="max-height: 400px; padding-right: 5px;">
                            <p class="text-muted small text-center mt-4">Loading feedback...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const cookId = localStorage.getItem('userId');
        let chartInstance = null;

        // 1. Fetch Orders and Generate Graph
        async function loadAnalytics() {
            try {
                // Fetch all orders for this cook
                const res = await fetch(`/api/Orders/cook/${cookId}`);
                if (!res.ok) return;
                const orders = await res.json();

                let totalRev = 0;
                let totalQty = 0;
                const dishSales = {}; // Object to group sales by dish name

                // Aggregate Data
                orders.forEach(order => {
                    // Only count orders that aren't cancelled (assuming 'Ready' or 'Pending' means sold)
                    totalRev += order.totalPrice;
                    totalQty += order.quantity;

                    const dishName = order.dailyMenu?.dishName || 'Custom Dish';
                    if (dishSales[dishName]) {
                        dishSales[dishName] += order.quantity;
                    } else {
                        dishSales[dishName] = order.quantity;
                    }
                });

                // Update KPI Cards
                document.getElementById('totalRevenue').innerText = `₹${totalRev.toFixed(2)}`;
                document.getElementById('totalOrders').innerText = totalQty;

                // Render Chart.js
                renderChart(dishSales);

            } catch (error) {
                console.error("Failed to load analytics", error);
            }
        }

        // Render the Bar Chart
        function renderChart(dishData) {
            const ctx = document.getElementById('salesChart').getContext('2d');

            const labels = Object.keys(dishData);
            const dataPoints = Object.values(dishData);

            if (chartInstance) {
                chartInstance.destroy(); // Destroy old chart before redrawing
            }

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Portions Sold',
                        data: dataPoints,
                        backgroundColor: 'rgba(255, 65, 108, 0.7)', // OotaBox Brand Color
                        borderColor: 'rgba(255, 65, 108, 1)',
                        borderWidth: 1,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { stepSize: 1 }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        // 2. Fetch Reviews and Ratings
        async function loadReviews() {
            try {
                // Fetch user data for the average rating
                const userRes = await fetch(`/api/Users/${cookId}`);
                if (userRes.ok) {
                    const user = await userRes.json();
                    document.getElementById('averageRating').innerText = user.rating > 0 ? user.rating.toFixed(1) : "New";
                }

                // Fetch the actual review comments
                // Note: Ensure your backend has a GET /api/Reviews/cook/{cookId} endpoint mapped
                const revRes = await fetch(`/api/Reviews/cook/${cookId}`);
                const list = document.getElementById('reviewsList');

                if (!revRes.ok) {
                    list.innerHTML = '<p class="text-muted text-center small mt-4">API endpoint pending.</p>';
                    return;
                }

                const reviews = await revRes.json();

                if (reviews.length === 0) {
                    list.innerHTML = '<p class="text-muted text-center small mt-4"><i class="fa-regular fa-comment-slash fs-2 mb-2 d-block"></i>No reviews received yet.</p>';
                    return;
                }

                list.innerHTML = '';
                // Sort newest first
                reviews.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).forEach(r => {
                    const stars = '⭐'.repeat(r.rating);
                    const dateObj = new Date(r.createdAt).toLocaleDateString('en-IN', { month: 'short', day: 'numeric' });

                    list.innerHTML += `
                        <div class="p-3 border rounded-3 bg-white shadow-sm mb-2">
                            <div class="d-flex justify-content-between align-items-center mb-1">
                                <div class="small">${stars}</div>
                                <span class="text-muted" style="font-size: 0.7rem;">${dateObj}</span>
                            </div>
                            <p class="mb-0 text-dark small fw-bold">"${r.comment}"</p>
                        </div>
                    `;
                });

            } catch (error) {
                console.error("Failed to load reviews", error);
                document.getElementById('reviewsList').innerHTML = '<p class="text-danger small">Error loading feedback.</p>';
            }
        }

        // Initialize Page
        loadAnalytics();
        loadReviews();
    </script>
</body>
</html>
