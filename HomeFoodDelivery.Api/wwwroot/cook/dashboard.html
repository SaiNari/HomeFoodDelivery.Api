<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kitchen Management - OotaBox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand">🍳 My Kitchen</span>
            <button class="btn btn-sm btn-outline-light" onclick="localStorage.clear(); window.location.href='/index.html'">Logout</button>
        </div>
    </nav>

    <div class="container mt-4">
        <h4 class="mb-3">Welcome, <span id="cookName"></span>!</h4>

        <div class="card p-4 shadow-sm mb-4">
            <h5>Post Today's Menu</h5>
            <form id="menuForm">
                <div class="mb-2">
                    <select id="dishSelect" class="form-select" onchange="toggleCustomDish()" required>
                        <option value="" disabled selected>-- Select a Dish to Prepare --</option>
                        <option value="Mutton Donne Biryani">Mutton Donne Biryani</option>
                        <option value="Chicken Dum Biryani">Chicken Dum Biryani</option>
                        <option value="Chapati & Chicken Curry">Chapati & Chicken Curry</option>
                        <option value="South Indian Veg Meals">South Indian Veg Meals</option>
                        <option value="Bisibelebath">Bisibelebath</option>
                        <option value="Custom">✨ Custom Dish (I'll name it myself)</option>
                    </select>
                </div>

                <div class="mb-2 d-none" id="customDishContainer">
                    <input type="text" id="customDishName" class="form-control" placeholder="Enter your custom dish name">
                </div>

              
                <div class="mb-3">
                    <textarea id="dishDescription" class="form-control" rows="2" placeholder="Briefly describe your dish (e.g., Authentic family recipe, slow-cooked...)"></textarea>
                </div>

                <div class="mb-3">
                    <input type="hidden" id="imageUrl">
                    <button type="button" id="upload_widget" class="btn btn-outline-secondary w-100">Click to Upload Dish Photo</button>
                    <div id="imagePreview" class="mt-2 text-center"></div>
                </div>

                <div class="mb-2">
                    <input type="number" id="price" class="form-control" placeholder="Price (₹)" required>
                </div>
                <div class="mb-2">
                    <input type="number" id="portions" class="form-control" placeholder="Total Portions Available" required>
                </div>
                <button type="button" onclick="postMenu()" class="btn btn-success w-100">Publish Menu</button>
            </form>
        </div>

        <div class="card p-4 shadow-sm">
            <h5>Live Orders</h5>
            <table class="table">
                <thead>
                    <tr>
                        <th>Dish</th>
                        <th>Quantity</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="orderTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.getElementById('cookName').innerText = localStorage.getItem('fullName');

        // --- Cloudinary Widget Initialization ---
        var myWidget = cloudinary.createUploadWidget({
            cloudName: 'dgyelvtpf', 
            uploadPreset: 'ml_default'   
        }, (error, result) => {
            if (!error && result && result.event === "success") {
                const url = result.info.secure_url;
                document.getElementById('imageUrl').value = url;
                document.getElementById('imagePreview').innerHTML = `<img src="${url}" width="100" class="rounded shadow mt-2">`;
                alert("Image uploaded successfully!");
            }
        });

        document.getElementById("upload_widget").addEventListener("click", function () {
            myWidget.open();
        }, false);

        function toggleCustomDish() {
            const selectValue = document.getElementById('dishSelect').value;
            const customContainer = document.getElementById('customDishContainer');
            const customInput = document.getElementById('customDishName');

            if (selectValue === 'Custom') {
                customContainer.classList.remove('d-none');
                customInput.required = true;
            } else {
                customContainer.classList.add('d-none');
                customInput.required = false;
                customInput.value = ''; 
            }
        }

        async function postMenu() {
            // Determine the final dish name based on the dropdown selection
            const selectedDish = document.getElementById('dishSelect').value;
            const finalDishName = selectedDish === 'Custom' ? document.getElementById('customDishName').value : selectedDish;

            if (!finalDishName) {
                alert("Please provide a dish name.");
                return;
            }

            const payload = {
                cookId: parseInt(localStorage.getItem('userId')),
                shiftId: 1,
                menuDate: new Date().toISOString(),
                dishName: finalDishName, 
                description: document.getElementById('dishDescription').value, 
                availablePortions: parseInt(document.getElementById('portions').value),
                pricePerPortion: parseFloat(document.getElementById('price').value),
                imageUrl: document.getElementById('imageUrl').value
            };

            const response = await fetch('/api/DailyMenus', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("Menu Published Successfully!");
                document.getElementById('menuForm').reset();
                document.getElementById('imagePreview').innerHTML = '';
                toggleCustomDish();
            } else {
                const error = await response.text();
                alert("Error: " + error);
            }
        }

        async function loadOrders() {
            const cookId = localStorage.getItem('userId');
            const response = await fetch(`/api/Orders/cook/${cookId}`);
            const rawOrders = await response.json();
            const tableBody = document.getElementById('orderTableBody');

            tableBody.innerHTML = '';

            // 1. Group the orders by Dish Name and Status
            const groupedOrders = [];
            rawOrders.forEach(order => {
                const dishName = order.dailyMenu?.dishName || 'Unknown Dish';
                const existingGroup = groupedOrders.find(g => g.dishName === dishName && g.orderStatus === order.orderStatus);

                if (existingGroup) {
                    existingGroup.quantity += order.quantity;
                    existingGroup.orderIds.push(order.orderId);
                } else {
                    groupedOrders.push({
                        ...order,
                        dishName: dishName,
                        orderIds: [order.orderId]
                    });
                }
            });

            // 2. Render the grouped list
            groupedOrders.forEach(group => {
                // Hide the button if the orders are already completed
                const actionButton = group.orderStatus === 'Pending'
                    ? `<button class="btn btn-sm btn-success fw-bold shadow-sm" onclick="updateGroupStatus('${group.orderIds.join(',')}')">
                   <i class="fa-solid fa-check me-1"></i> Mark Ready
               </button>`
                    : `<span class="text-success small fw-bold"><i class="fa-solid fa-check-circle"></i> Completed</span>`;

                const statusBadge = group.orderStatus === 'Ready' ? 'bg-success' : 'bg-warning text-dark';

                tableBody.innerHTML += `
            <tr class="align-middle">
                <td class="fw-bold">${group.dishName}</td>
                <td>
                    <span class="badge bg-danger rounded-pill shadow-sm px-3">
                        ${group.quantity}
                    </span>
                </td>
                <td>
                    <span class="badge ${statusBadge} px-3 py-2 rounded-pill shadow-sm">
                        ${group.orderStatus}
                    </span>
                </td>
                <td>
                    ${actionButton}
                </td>
            </tr>
        `;
            });
        }

        // 3. New function to update multiple orders at once
        async function updateGroupStatus(orderIdsStr) {
            const ids = orderIdsStr.split(','); // Convert the string back into an array

            try {
                // Run all API updates in parallel using Promise.all for maximum speed
                await Promise.all(ids.map(id =>
                    fetch(`/api/Orders/${id}/status`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify("Ready")
                    })
                ));

                // SignalR will handle the refresh, but we can call it manually as a fallback
                loadOrders();
            } catch (error) {
                console.error(error);
                alert("Failed to update status for one or more items.");
            }
        }

        async function updateOrderStatus(orderId) {
            const response = await fetch(`/api/Orders/${orderId}/status`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify("Ready")
            });

            if (response.ok) {
                alert("Order status updated to Ready!");
                loadOrders();
            } else {
                alert("Failed to update status.");
            }
        }

        loadOrders();
        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/kitchenHub")
            .build();

        // Define handler once
        connection.on("OrderReceived", function () {
            console.log("🔔 New order detected! Updating dashboard...");
            loadOrders();
        });

        // Start connection
        connection.start()
            .then(function () {
                console.log("Live connection to kitchen hub established.");
            })
            .catch(function (err) {
                console.error("SignalR Connection Error: ", err.toString());
            });
    </script>
</body>
</html>
