<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kitchen Operations - OotaBox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
    <script>if (!localStorage.getItem('userId') || localStorage.getItem('userRole') !== 'Cook') window.location.href = '/index.html';</script>
</head>
<body class="bg-light pb-5">

    <!-- Clean, Enterprise Navigation -->
    <nav class="navbar navbar-expand bg-dark navbar-dark shadow-sm sticky-top">
        <div class="container-fluid">
            <span class="navbar-brand fw-bold"><i class="fa-solid fa-kitchen-set text-warning me-2"></i> My Kitchen</span>

            <div class="d-flex align-items-center ms-auto">
                <div class="dropdown">
                    <button class="btn btn-light rounded-pill px-3 shadow-sm dropdown-toggle fw-bold" type="button" id="myAccountMenu" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="fa-solid fa-circle-user text-danger me-1"></i> My Account
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2 rounded-3" aria-labelledby="myAccountMenu">
                        <li><a class="dropdown-item py-2 fw-bold" href="profile.html"><i class="fa-solid fa-id-card text-primary me-2"></i> My Profile & Socials</a></li>
                        <li><a class="dropdown-item py-2 fw-bold" href="analytics.html"><i class="fa-solid fa-chart-line text-info me-2"></i> Analytics & Reviews</a></li>
                        <li><a class="dropdown-item py-2 fw-bold" href="/customer/wallet.html"><i class="fa-solid fa-wallet text-success me-2"></i> Earnings & Wallet</a></li>
                        <li><a class="dropdown-item py-2 fw-bold" href="/customer/referral.html"><i class="fa-solid fa-gift text-warning me-2"></i> Refer a Friend</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><button class="dropdown-item py-2 fw-bold text-danger" onclick="localStorage.clear(); window.location.href='/index.html'"><i class="fa-solid fa-right-from-bracket me-2"></i> Logout</button></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4" style="max-width: 1000px;">
        <h4 class="mb-4 fw-bold text-dark">Welcome back, <span id="cookName" class="text-danger"></span>!</h4>

        <div class="row">
            <!-- Left Column: Menu Scheduler (Slightly wider now) -->
            <div class="col-md-5 mb-4">
                <div class="card border-0 shadow-sm rounded-4 h-100 border-top border-primary border-4">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4"><i class="fa-regular fa-calendar-plus me-2 text-primary"></i>Schedule a Meal</h5>
                        <form id="menuForm">
                            <div class="row g-2 mb-3">
                                <div class="col-6">
                                    <label class="form-label small fw-bold text-muted">DATE</label>
                                    <input type="date" id="menuDate" class="form-control bg-light" required>
                                </div>
                                <div class="col-6">
                                    <label class="form-label small fw-bold text-muted">SHIFT</label>
                                    <select id="shiftSelect" class="form-select bg-light" required>
                                        <option value="1">Breakfast</option>
                                        <option value="2">Lunch</option>
                                        <option value="3">Dinner</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold text-muted">WHAT ARE YOU COOKING?</label>
                                <select id="dishSelect" class="form-select bg-light" onchange="toggleCustomDish()" required>
                                    <option value="" disabled selected>-- Select a Dish --</option>
                                    <option value="Mutton Donne Biryani">Mutton Donne Biryani</option>
                                    <option value="Chicken Dum Biryani">Chicken Dum Biryani</option>
                                    <option value="Custom">✨ Custom Dish (Name it myself)</option>
                                </select>
                            </div>
                            <div class="mb-3 d-none" id="customDishContainer">
                                <input type="text" id="customDishName" class="form-control" placeholder="Enter custom dish name">
                            </div>
                            <div class="mb-3">
                                <textarea id="dishDescription" class="form-control bg-light" rows="2" placeholder="Briefly describe your dish..."></textarea>
                            </div>
                            <div class="mb-4">
                                <input type="hidden" id="imageUrl">
                                <button type="button" id="upload_widget" class="btn btn-outline-secondary w-100 fw-bold border-dashed"><i class="fa-solid fa-camera me-2"></i>Upload Food Photo</button>
                                <div id="imagePreview" class="mt-2 text-center"></div>
                            </div>
                            <div class="row g-2 mb-4">
                                <div class="col-6">
                                    <label class="form-label small fw-bold text-muted">PRICE PER PORTION</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white">₹</span>
                                        <input type="number" id="price" class="form-control" placeholder="0.00" required>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <label class="form-label small fw-bold text-muted">TOTAL PORTIONS</label>
                                    <input type="number" id="portions" class="form-control" placeholder="e.g., 10" required>
                                </div>
                            </div>
                            <button type="button" onclick="postMenu()" class="btn btn-primary w-100 fw-bold py-2 shadow-sm rounded-pill">Publish to Schedule</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Right Column: Live Orders & Upcoming Schedule -->
            <div class="col-md-7 mb-4">

                <!-- Live Orders -->
                <div class="card border-0 shadow-sm rounded-4 mb-4 border-top border-danger border-4">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="fw-bold mb-0"><i class="fa-solid fa-fire-burner me-2 text-danger"></i>Live Orders</h5>
                            <span class="badge bg-danger bg-opacity-10 text-danger rounded-pill px-3 py-1 animate-pulse">● Live</span>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr class="text-muted small">
                                        <th>Dish</th>
                                        <th>Qty</th>
                                        <th>Status</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="orderTableBody">
                                    <tr><td colspan="4" class="text-center text-muted py-4">No active orders right now.</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- My Schedule -->
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-3"><i class="fa-regular fa-calendar-check me-2 text-success"></i>Upcoming Schedule</h5>
                        <div id="scheduleList" class="d-flex flex-column gap-3">
                            <p class="text-muted small text-center my-3">Loading schedule...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Core Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('cookName').innerText = localStorage.getItem('fullName');
        const dateInput = document.getElementById('menuDate');
        const today = new Date().toISOString().split('T')[0];
        dateInput.value = today;
        dateInput.min = today;

        var myWidget = cloudinary.createUploadWidget({ cloudName: 'dgyelvtpf', uploadPreset: 'ml_default' }, (error, result) => {
            if (!error && result && result.event === "success") {
                document.getElementById('imageUrl').value = result.info.secure_url;
                document.getElementById('imagePreview').innerHTML = `<img src="${result.info.secure_url}" width="100" class="rounded shadow-sm mt-2" style="height: 60px; object-fit: cover;">`;
            }
        });
        document.getElementById("upload_widget").addEventListener("click", () => myWidget.open(), false);

        function toggleCustomDish() {
            const isCustom = document.getElementById('dishSelect').value === 'Custom';
            document.getElementById('customDishContainer').classList.toggle('d-none', !isCustom);
            document.getElementById('customDishName').required = isCustom;
        }

        async function postMenu() {
            const isCustom = document.getElementById('dishSelect').value === 'Custom';
            const dishName = isCustom ? document.getElementById('customDishName').value : document.getElementById('dishSelect').value;
            if (!dishName || !document.getElementById('price').value) return alert("Please fill all fields.");

            const payload = {
                cookId: parseInt(localStorage.getItem('userId')),
                shiftId: parseInt(document.getElementById('shiftSelect').value),
                menuDate: new Date(document.getElementById('menuDate').value).toISOString(),
                dishName: dishName,
                description: document.getElementById('dishDescription').value,
                availablePortions: parseInt(document.getElementById('portions').value),
                pricePerPortion: parseFloat(document.getElementById('price').value),
                imageUrl: document.getElementById('imageUrl').value
            };
            const res = await fetch('/api/DailyMenus', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (res.ok) {
                alert("Meal published successfully!");
                document.getElementById('menuForm').reset();
                dateInput.value = today;
                document.getElementById('imagePreview').innerHTML = '';
                loadSchedule();
            }
        }

        async function loadSchedule() {
            const res = await fetch('/api/DailyMenus');
            const all = await res.json();
            const list = document.getElementById('scheduleList');
            list.innerHTML = '';
            const myMenus = all.filter(m => m.cookId == localStorage.getItem('userId'));

            if (myMenus.length === 0) {
                list.innerHTML = '<p class="text-muted text-center"><i class="fa-solid fa-calendar-xmark fs-2 mb-2"></i><br>Nothing scheduled yet.</p>';
                return;
            }

            myMenus.forEach(m => {
                const dateObj = new Date(m.menuDate).toLocaleDateString('en-IN', { weekday: 'short', month: 'short', day: 'numeric' });
                list.innerHTML += `
                        <div class="d-flex justify-content-between align-items-center p-3 border rounded-3 bg-white shadow-sm">
                            <div>
                                <h6 class="fw-bold mb-1 text-dark">${m.dishName}</h6>
                                <small class="text-muted">${m.availablePortions} portions @ ₹${m.pricePerPortion}</small>
                            </div>
                            <div class="text-end border-start ps-3">
                                <span class="fw-bold fs-6 text-dark d-block">${dateObj}</span>
                            </div>
                        </div>`;
            });
        }

        async function loadOrders() {
            const res = await fetch(`/api/Orders/cook/${localStorage.getItem('userId')}`);
            const orders = await res.json();
            const tbody = document.getElementById('orderTableBody');

            if (orders.length === 0) return tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">No active orders right now.</td></tr>';

            tbody.innerHTML = orders.map(o => `
                    <tr>
                        <td class="fw-bold text-dark">${o.dailyMenu?.dishName || 'Dish'}</td>
                        <td><span class="badge bg-light text-dark border px-2">${o.quantity}</span></td>
                        <td><span class="badge ${o.orderStatus === 'Ready' ? 'bg-success' : 'bg-warning text-dark'} rounded-pill">${o.orderStatus}</span></td>
                        <td>
                            ${o.orderStatus === 'Pending' ? `<button class="btn btn-sm btn-success fw-bold rounded-pill px-3" onclick="updateGroupStatus('${o.orderId}')">Mark Ready</button>` : `<span class="text-success small fw-bold"><i class="fa-solid fa-check"></i></span>`}
                        </td>
                    </tr>
                `).join('');
        }

        async function updateGroupStatus(orderId) {
            await fetch(`/api/Orders/${orderId}/status`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify("Ready") });
            loadOrders();
        }

        loadSchedule();
        loadOrders();

        const connection = new signalR.HubConnectionBuilder().withUrl("/kitchenHub").build();
        connection.on("OrderReceived", loadOrders);
        connection.start().catch(err => console.error("SignalR Error: ", err.toString()));
    </script>
</body>
</html>
