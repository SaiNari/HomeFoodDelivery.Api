<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kitchen Management - OotaBox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
</head>
<body class="bg-light pb-5">
    <nav class="navbar navbar-dark bg-dark shadow-sm sticky-top">
        <div class="container-fluid">
            <span class="navbar-brand fw-bold"><i class="fa-solid fa-kitchen-set text-warning me-2"></i> My Kitchen</span>
            <button class="btn btn-sm btn-outline-light fw-bold" onclick="localStorage.clear(); window.location.href='/index.html'">Logout</button>
        </div>
    </nav>

    <div class="container mt-4" style="max-width: 900px;">
        <h4 class="mb-4 fw-bold text-dark">Welcome back, <span id="cookName" class="text-danger"></span>!</h4>

        <div class="row">
            <!-- Left Column: Menu Scheduler Form -->
            <div class="col-md-5 mb-4">
                <div class="card border-0 shadow-sm rounded-4 h-100">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-3"><i class="fa-regular fa-calendar-plus me-2 text-primary"></i>Schedule a Meal</h5>
                        <form id="menuForm">
                            <div class="row g-2 mb-3">
                                <div class="col-6">
                                    <label class="form-label small fw-bold text-muted">DATE</label>
                                    <input type="date" id="menuDate" class="form-control" required>
                                </div>
                                <div class="col-6">
                                    <label class="form-label small fw-bold text-muted">SHIFT</label>
                                    <select id="shiftSelect" class="form-select" required>
                                        <option value="1">Breakfast</option>
                                        <option value="2">Lunch</option>
                                        <option value="3">Dinner</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-2">
                                <select id="dishSelect" class="form-select" onchange="toggleCustomDish()" required>
                                    <option value="" disabled selected>-- Select a Dish --</option>
                                    <option value="Mutton Donne Biryani">Mutton Donne Biryani</option>
                                    <option value="Chicken Dum Biryani">Chicken Dum Biryani</option>
                                    <option value="Chapati & Chicken Curry">Chapati & Chicken Curry</option>
                                    <option value="South Indian Veg Meals">South Indian Veg Meals</option>
                                    <option value="Bisibelebath">Bisibelebath</option>
                                    <option value="Custom">✨ Custom Dish (Name it myself)</option>
                                </select>
                            </div>
                            <div class="mb-2 d-none" id="customDishContainer">
                                <input type="text" id="customDishName" class="form-control" placeholder="Enter custom dish name">
                            </div>

                            <div class="mb-3">
                                <textarea id="dishDescription" class="form-control" rows="2" placeholder="Briefly describe your dish (e.g., Authentic family recipe...)"></textarea>
                            </div>

                            <div class="mb-3">
                                <input type="hidden" id="imageUrl">
                                <button type="button" id="upload_widget" class="btn btn-light border w-100 fw-bold text-muted"><i class="fa-solid fa-camera me-2"></i>Upload Dish Photo</button>
                                <div id="imagePreview" class="mt-2 text-center"></div>
                            </div>

                            <div class="row g-2 mb-3">
                                <div class="col-6">
                                    <div class="input-group">
                                        <span class="input-group-text bg-white">₹</span>
                                        <input type="number" id="price" class="form-control" placeholder="Price" required>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <input type="number" id="portions" class="form-control" placeholder="Total Portions" required>
                                </div>
                            </div>

                            <button type="button" onclick="postMenu()" class="btn btn-dark w-100 fw-bold py-2 shadow-sm">Publish to Schedule</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Right Column: Live Orders & Upcoming Schedule -->
            <div class="col-md-7 mb-4">
                <!-- Live Orders -->
                <div class="card border-0 shadow-sm rounded-4 mb-4 border-top border-danger border-4">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-3"><i class="fa-solid fa-fire-burner me-2 text-danger"></i>Live Orders to Cook</h5>
                        <div class="table-responsive">
                            <table class="table align-middle">
                                <thead>
                                    <tr class="text-muted small">
                                        <th>Dish</th>
                                        <th>Qty</th>
                                        <th>Status</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="orderTableBody">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- My Schedule -->
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-3"><i class="fa-regular fa-calendar-check me-2 text-success"></i>My Upcoming Schedule</h5>
                        <div id="scheduleList" class="d-flex flex-column gap-2">
                            <p class="text-muted small text-center my-3">Loading schedule...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('cookName').innerText = localStorage.getItem('fullName');

        // Set default date to today & prevent past dates
        const dateInput = document.getElementById('menuDate');
        const today = new Date().toISOString().split('T')[0];
        dateInput.value = today;
        dateInput.min = today;

        // --- Cloudinary Widget ---
        var myWidget = cloudinary.createUploadWidget({
            cloudName: 'dgyelvtpf',
            uploadPreset: 'ml_default'
        }, (error, result) => {
            if (!error && result && result.event === "success") {
                const url = result.info.secure_url;
                document.getElementById('imageUrl').value = url;
                document.getElementById('imagePreview').innerHTML = `<img src="${url}" width="100" class="rounded shadow mt-2" style="height: 60px; object-fit: cover;">`;
            }
        });
        document.getElementById("upload_widget").addEventListener("click", () => myWidget.open(), false);

        function toggleCustomDish() {
            const selectValue = document.getElementById('dishSelect').value;
            const customContainer = document.getElementById('customDishContainer');
            const customInput = document.getElementById('customDishName');
            if (selectValue === 'Custom') {
                customContainer.classList.remove('d-none');
                customInput.required = true;
            } else {
                customContainer.classList.add('d-none');
                customInput.required = false;
                customInput.value = '';
            }
        }

        async function postMenu() {
            const selectedDish = document.getElementById('dishSelect').value;
            const finalDishName = selectedDish === 'Custom' ? document.getElementById('customDishName').value : selectedDish;

            if (!finalDishName) return alert("Please provide a dish name.");

            // Construct proper UTC date string from the input
            const selectedDate = document.getElementById('menuDate').value;
            const formattedDate = new Date(selectedDate).toISOString();

            const payload = {
                cookId: parseInt(localStorage.getItem('userId')),
                shiftId: parseInt(document.getElementById('shiftSelect').value),
                menuDate: formattedDate,
                dishName: finalDishName,
                description: document.getElementById('dishDescription').value,
                availablePortions: parseInt(document.getElementById('portions').value),
                pricePerPortion: parseFloat(document.getElementById('price').value),
                imageUrl: document.getElementById('imageUrl').value
            };

            const response = await fetch('/api/DailyMenus', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("Meal successfully added to your schedule!");
                document.getElementById('menuForm').reset();
                dateInput.value = today; // reset date
                document.getElementById('imagePreview').innerHTML = '';
                toggleCustomDish();
                loadSchedule(); // Refresh the visualizer
            } else {
                alert("Error: Failed to post menu.");
            }
        }

        async function loadSchedule() {
            const cookId = localStorage.getItem('userId');
            try {
                const response = await fetch(`/api/DailyMenus`);
                const allMenus = await response.json();

                // Filter menus for this specific cook
                const myMenus = allMenus.filter(m => m.cookId == cookId);
                const list = document.getElementById('scheduleList');
                list.innerHTML = '';

                if (myMenus.length === 0) {
                    list.innerHTML = '<p class="text-muted small text-center my-3"><i class="fa-solid fa-calendar-xmark fs-2 mb-2 d-block"></i>Nothing scheduled yet.</p>';
                    return;
                }

                // Sort by date closest first
                myMenus.sort((a, b) => new Date(a.menuDate) - new Date(b.menuDate));

                myMenus.forEach(menu => {
                    const dateObj = new Date(menu.menuDate);
                    const formattedDate = dateObj.toLocaleDateString('en-IN', { weekday: 'short', month: 'short', day: 'numeric' });

                    let shiftName = "Breakfast";
                    let shiftColor = "text-warning";
                    if (menu.shiftId === 2) { shiftName = "Lunch"; shiftColor = "text-primary"; }
                    if (menu.shiftId === 3) { shiftName = "Dinner"; shiftColor = "text-info"; }

                    list.innerHTML += `
                                <div class="d-flex justify-content-between align-items-center p-3 border rounded-3 bg-white">
                                    <div>
                                        <h6 class="fw-bold mb-1 text-dark">${menu.dishName}</h6>
                                        <small class="fw-bold ${shiftColor}"><i class="fa-regular fa-clock me-1"></i>${shiftName}</small>
                                        <small class="text-muted ms-2">| ${menu.availablePortions} portions @ ₹${menu.pricePerPortion}</small>
                                    </div>
                                    <div class="text-end border-start ps-3">
                                        <div class="fw-bold fs-6 text-dark">${formattedDate}</div>
                                    </div>
                                </div>
                            `;
                });
            } catch (err) {
                console.error(err);
            }
        }

        async function loadOrders() {
            const cookId = localStorage.getItem('userId');
            const response = await fetch(`/api/Orders/cook/${cookId}`);
            const rawOrders = await response.json();
            const tableBody = document.getElementById('orderTableBody');
            tableBody.innerHTML = '';

            const groupedOrders = [];
            rawOrders.forEach(order => {
                const dishName = order.dailyMenu?.dishName || 'Unknown Dish';
                const existingGroup = groupedOrders.find(g => g.dishName === dishName && g.orderStatus === order.orderStatus);
                if (existingGroup) {
                    existingGroup.quantity += order.quantity;
                    existingGroup.orderIds.push(order.orderId);
                } else {
                    groupedOrders.push({ ...order, dishName: dishName, orderIds: [order.orderId] });
                }
            });

            if (groupedOrders.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-3">No active orders right now.</td></tr>';
            }

            groupedOrders.forEach(group => {
                const actionButton = group.orderStatus === 'Pending'
                    ? `<button class="btn btn-sm btn-success fw-bold shadow-sm rounded-pill px-3" onclick="updateGroupStatus('${group.orderIds.join(',')}')">Ready</button>`
                    : `<span class="text-success small fw-bold"><i class="fa-solid fa-check-double"></i> Done</span>`;

                const statusBadge = group.orderStatus === 'Ready' ? 'bg-success' : 'bg-warning text-dark';

                tableBody.innerHTML += `
                            <tr>
                                <td class="fw-bold text-dark">${group.dishName}</td>
                                <td><span class="badge bg-danger rounded-pill">${group.quantity}</span></td>
                                <td><span class="badge ${statusBadge} rounded-pill">${group.orderStatus}</span></td>
                                <td>${actionButton}</td>
                            </tr>
                        `;
            });
        }

        async function updateGroupStatus(orderIdsStr) {
            const ids = orderIdsStr.split(',');
            try {
                await Promise.all(ids.map(id =>
                    fetch(`/api/Orders/${id}/status`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify("Ready")
                    })
                ));
                loadOrders();
            } catch (error) {
                console.error(error);
                alert("Failed to update status.");
            }
        }

        // Initialize dashboard
        loadSchedule();
        loadOrders();

        // SignalR Live Updates
        const connection = new signalR.HubConnectionBuilder().withUrl("/kitchenHub").build();
        connection.on("OrderReceived", () => {
            console.log("🔥 New order detected! Updating dashboard...");
            loadOrders();
        });
        connection.start().catch(err => console.error("SignalR Error: ", err.toString()));
    </script>
    <script src="/js/ootabot.js"></script>
</body>
</html>
