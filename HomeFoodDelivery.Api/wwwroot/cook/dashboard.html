<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kitchen Management - OotaBox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand">🍳 My Kitchen</span>
            <button class="btn btn-sm btn-outline-light" onclick="localStorage.clear(); window.location.href='/index.html'">Logout</button>
        </div>
    </nav>

    <div class="container mt-4">
        <h4 class="mb-3">Welcome, <span id="cookName"></span>!</h4>

        <div class="card p-4 shadow-sm mb-4">
            <h5>Post Today's Menu</h5>
            <form id="menuForm">
                <div class="mb-2">
                    <input type="text" id="dishName" class="form-control" placeholder="Dish Name (e.g., Mutton Biryani)" required>
                </div>

                <div class="mb-3">
                    <input type="hidden" id="imageUrl">
                    <button type="button" id="upload_widget" class="btn btn-outline-secondary w-100">Click to Upload Dish Photo</button>
                    <div id="imagePreview" class="mt-2 text-center"></div>
                </div>

                <div class="mb-2">
                    <input type="number" id="price" class="form-control" placeholder="Price (₹)" required>
                </div>
                <div class="mb-2">
                    <input type="number" id="portions" class="form-control" placeholder="Total Portions Available" required>
                </div>
                <button type="button" onclick="postMenu()" class="btn btn-success w-100">Publish Menu</button>
            </form>
        </div>

        <div class="card p-4 shadow-sm">
            <h5>Live Orders</h5>
            <table class="table">
                <thead>
                    <tr>
                        <th>Dish</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="orderTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.getElementById('cookName').innerText = localStorage.getItem('fullName');

        // --- Cloudinary Widget Initialization ---
        var myWidget = cloudinary.createUploadWidget({
            cloudName: 'dgyelvtpf', // REPLACE THIS with your Cloudinary Cloud Name
            uploadPreset: 'ml_default'    // This is the default preset for free accounts
        }, (error, result) => {
            if (!error && result && result.event === "success") {
                const url = result.info.secure_url;
                document.getElementById('imageUrl').value = url;
                document.getElementById('imagePreview').innerHTML = `<img src="${url}" width="100" class="rounded shadow mt-2">`;
                alert("Image uploaded successfully!");
            }
        });

        document.getElementById("upload_widget").addEventListener("click", function () {
            myWidget.open();
        }, false);
        // ----------------------------------------

        async function postMenu() {
            const payload = {
                cookId: parseInt(localStorage.getItem('userId')),
                shiftId: 1,
                menuDate: new Date().toISOString(),
                dishName: document.getElementById('dishName').value,
                availablePortions: parseInt(document.getElementById('portions').value),
                pricePerPortion: parseFloat(document.getElementById('price').value),
                imageUrl: document.getElementById('imageUrl').value // Captures the uploaded URL
            };

            const response = await fetch('/api/DailyMenus', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("Menu Published Successfully!");
                document.getElementById('menuForm').reset();
                document.getElementById('imagePreview').innerHTML = ''; // Clear preview
            } else {
                const error = await response.text();
                alert("Error: " + error);
            }
        }

        async function loadOrders() {
            const cookId = localStorage.getItem('userId');
            const response = await fetch(`/api/Orders/cook/${cookId}`);
            const orders = await response.json();

            const tableBody = document.getElementById('orderTableBody');
            tableBody.innerHTML = '';

            orders.forEach(order => {
                tableBody.innerHTML += `
                        <tr>
                            <td>${order.dailyMenu?.dishName || 'Unknown Dish'}</td>
                            <td><span class="badge bg-warning">${order.orderStatus}</span></td>
                            <td><button class="btn btn-sm btn-success" onclick="updateOrderStatus(${order.orderId})">Ready</button></td>
                        </tr>
                    `;
            });
        }

        async function updateOrderStatus(orderId) {
            const response = await fetch(`/api/Orders/${orderId}/status`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify("Ready")
            });

            if (response.ok) {
                alert("Order status updated to Ready!");
                loadOrders();
            } else {
                alert("Failed to update status.");
            }
        }

        loadOrders();
    </script>
</body>
</html>
