<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu - OotaBox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>if (!localStorage.getItem('userTechPark')) window.location.href = 'select-techpark.html';</script>
</head>
<body class="bg-light pb-5" style="margin-bottom: 80px;">

    <nav class="navbar navbar-light bg-white shadow-sm sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <button class="btn btn-link text-dark text-decoration-none px-0" onclick="window.location.href='kitchen-list.html'">
                <i class="fa-solid fa-arrow-left me-1"></i> Back
            </button>
            <span class="navbar-brand fw-bold text-dark fs-5 mx-auto">Today's Menu</span>
            <a href="dashboard.html" class="btn btn-sm btn-outline-dark fw-bold">🧾 Orders</a>
        </div>
    </nav>

    <div class="container mt-3">
        <div class="card border-0 shadow-sm rounded-4 mb-4 bg-white" onclick="window.location.href='cook-profile.html'" style="cursor: pointer;">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <div class="bg-danger bg-opacity-10 rounded-circle d-flex justify-content-center align-items-center me-3" style="width: 50px; height: 50px;">
                        <i class="fa-solid fa-kitchen-set fs-4 text-danger"></i>
                    </div>
                    <div>
                        <h6 class="fw-bold text-dark mb-0" id="kitchenNameDisplay">Loading Kitchen...</h6>
                        <span class="text-success small fw-bold"><i class="fa-solid fa-star text-warning"></i> <span id="ratingDisplay">--</span> (View Profile)</span>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-muted"></i>
            </div>
        </div>

        <div id="scheduleContainer" class="mb-5">
            <p class="text-muted mt-4 text-center">Loading menu...</p>
        </div>
    </div>

    <div class="fixed-bottom bg-white border-top p-3 shadow-lg">
        <div class="container d-flex justify-content-between align-items-center">
            <div>
                <span class="text-muted small">Cart Total</span><br>
                <strong class="fs-5 text-dark" id="cartTotalDisplay">₹0</strong>
            </div>
            <button class="btn btn-danger btn-lg px-5 fw-bold rounded-pill shadow" onclick="window.location.href='checkout.html'">View Cart →</button>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        const cookId = localStorage.getItem('activeCookId');
        let fullMenuData = [];

        const shifts = {
            1: { name: 'Breakfast', icon: 'fa-mug-saucer text-warning', cutoffHours: 7, cutoffMins: 30 },
            2: { name: 'Lunch', icon: 'fa-sun text-warning', cutoffHours: 11, cutoffMins: 0 },
            3: { name: 'Dinner', icon: 'fa-moon text-primary', cutoffHours: 18, cutoffMins: 30 }
        };

        async function loadCookProfile() {
            try {
                const userRes = await fetch(`/api/Users/${cookId}`);
                if (userRes.ok) {
                    const cook = await userRes.json();
                    document.getElementById('kitchenNameDisplay').innerText = cook.kitchenName || cook.fullName + "'s Kitchen";
                    document.getElementById('ratingDisplay').innerText = cook.rating > 0 ? cook.rating.toFixed(1) : "New";
                }
            } catch (e) { console.error(e); }
        }

        async function loadMenu() {
            try {
                const res = await fetch('/api/DailyMenus');
                const allMenus = await res.json();
                fullMenuData = allMenus.filter(m => m.cookId == cookId);
                renderSchedule();
            } catch (e) {
                document.getElementById('scheduleContainer').innerHTML = '<p class="text-danger text-center mt-4">Failed to load menu.</p>';
            }
        }

        function renderSchedule() {
            const container = document.getElementById('scheduleContainer');
            container.innerHTML = '';

            const now = new Date();
            const currentHour = now.getHours();
            const currentMin = now.getMinutes();
            const todayString = now.toDateString();
            let hasActiveDishes = false;

            Object.keys(shifts).forEach(shiftId => {
                const shiftInfo = shifts[shiftId];

                let shiftDishes = fullMenuData.filter(m =>
                    m.shiftId == shiftId &&
                    new Date(m.menuDate).toDateString() === todayString
                );

                // This is the Magic Filter: Hides Missed Cutoffs and Sold Out Items
                shiftDishes = shiftDishes.filter(m => {
                    let isMissedCutoff = (currentHour > shiftInfo.cutoffHours || (currentHour === shiftInfo.cutoffHours && currentMin >= shiftInfo.cutoffMins));
                    let isSoldOut = m.availablePortions <= 0;
                    return !isMissedCutoff && !isSoldOut;
                });

                if (shiftDishes.length > 0) {
                    hasActiveDishes = true;
                    let sectionHtml = `
                            <h6 class="fw-bold text-dark border-bottom pb-2 mt-4 mb-3">
                                <i class="fa-solid ${shiftInfo.icon} me-2"></i> ${shiftInfo.name}
                                <span class="text-muted fw-normal" style="font-size:0.75rem;">(Order by ${formatTime(shiftInfo.cutoffHours, shiftInfo.cutoffMins)})</span>
                            </h6>
                            <div class="row g-4">
                        `;

                    shiftDishes.forEach(m => {
                        const imgTag = m.imageUrl ? `<img src="${m.imageUrl}" class="card-img-top" style="height: 180px; object-fit: cover;">` : `<div class="bg-secondary text-white text-center py-5">No Image</div>`;

                        sectionHtml += `
                                <div class="col-12 col-md-6 col-lg-4">
                                    <div class="card h-100 shadow-sm border-0 rounded-4 overflow-hidden bg-white">
                                        ${imgTag}
                                        <div class="card-body p-4 d-flex flex-column">
                                            <h5 class="fw-bold text-dark">${m.dishName}</h5>
                                            <p class="text-muted small mb-3">${m.description || 'Authentic home-cooked meal.'}</p>
                                            <h5 class="text-danger fw-bold mt-auto mb-3">₹${m.pricePerPortion}</h5>
                                            <div class="d-flex align-items-center justify-content-between bg-light p-2 rounded-3 border w-100">
                                                <button class="btn btn-sm btn-white border fw-bold text-dark px-3" onclick="changeQty(${m.menuId}, -1)">-</button>
                                                <span id="display-qty-${m.menuId}" class="fw-bold px-2">1</span>
                                                <button class="btn btn-sm btn-white border fw-bold text-dark px-3" onclick="changeQty(${m.menuId}, 1)">+</button>
                                                <button onclick="addToCart(${m.menuId}, '${m.dishName}', ${m.pricePerPortion})" class="btn btn-dark btn-sm rounded-3 px-4 ms-2 fw-bold">ADD</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>`;
                    });

                    sectionHtml += `</div>`;
                    container.innerHTML += sectionHtml;
                }
            });

            if (!hasActiveDishes) {
                container.innerHTML = `<div class="text-center p-5 border rounded-4 bg-white mt-3"><i class="fa-solid fa-utensils fs-1 text-muted mb-3"></i><h5 class="fw-bold text-dark">Kitchen Closed</h5><span class="text-muted small">There are no active meals available to order for today.</span></div>`;
            }
        }

        function formatTime(hours, mins) {
            let ampm = hours >= 12 ? 'PM' : 'AM';
            let h = hours % 12;
            h = h ? h : 12;
            let m = mins < 10 ? '0' + mins : mins;
            return `${h}:${m} ${ampm}`;
        }

        function changeQty(id, change) {
            let el = document.getElementById(`display-qty-${id}`);
            let current = parseInt(el.innerText);
            if (current + change > 0) el.innerText = current + change;
        }

        function addToCart(id, name, price) {
            const qty = parseInt(document.getElementById(`display-qty-${id}`).innerText);
            const existing = cart.find(i => i.id === id);
            if (existing) existing.qty += qty;
            else cart.push({ id, name, price, qty });

            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cartTotalDisplay').innerText = "₹" + cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        }

        loadCookProfile();
        loadMenu();
        updateCartUI();
    </script>
</body>
</html>
