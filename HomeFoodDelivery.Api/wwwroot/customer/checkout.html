<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout - OotaBox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>if (!localStorage.getItem('userId')) window.location.href = '/index.html';</script>
</head>
<body class="bg-light pb-5">
    <nav class="navbar navbar-light bg-white shadow-sm mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <button class="btn btn-link text-dark text-decoration-none px-0" onclick="window.location.href='menu.html'">
                🔙 Back
            </button>
            <span class="navbar-brand fw-bold mx-auto">Secure Checkout</span>

            <!-- Navigation Action Buttons -->
            <div class="d-flex align-items-center gap-2">
                <a href="dashboard.html" class="btn btn-sm btn-outline-dark fw-bold">🧾 My Orders</a>
                <button class="btn btn-sm btn-outline-danger fw-bold" onclick="localStorage.clear(); window.location.href='/index.html'">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;">
        <div class="card shadow-sm border-0 rounded-4 p-4 mb-4">
            <h4 class="fw-bold mb-4 border-bottom pb-3">Order Summary</h4>
            <div id="cartItemsList"></div>

            <div class="d-flex justify-content-between align-items-center mt-4 pt-3 border-top">
                <span class="fs-5 text-muted">To Pay</span>
                <span class="fs-3 fw-bold text-danger" id="finalTotalDisplay">₹0</span>
            </div>
        </div>

        <div class="card shadow-sm border-0 rounded-4 p-4 mb-4">
            <h5 class="fw-bold mb-3">Pay on Delivery</h5>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="payment" id="upi" checked>
                <label class="form-check-label" for="upi">UPI / Cash on Delivery</label>
            </div>
        </div>

        <button id="payBtn" class="btn btn-dark btn-lg w-100 py-3 fw-bold rounded-pill shadow" onclick="placeOrder()">Confirm Order & Pay</button>
    </div>

    <script>
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        const container = document.getElementById('cartItemsList');
        let total = 0;

        if (cart.length === 0) {
            container.innerHTML = '<p class="text-muted text-center">Your cart is empty.</p>';
            document.getElementById('payBtn').disabled = true;
        } else {
            cart.forEach(item => {
                const itemTotal = item.price * item.qty;
                total += itemTotal;
                container.innerHTML += `
                    <div class="d-flex justify-content-between mb-3 align-items-center">
                        <div>
                            <div class="fw-bold text-dark">${item.name}</div>
                            <div class="text-muted small">₹${item.price} x ${item.qty}</div>
                        </div>
                        <div class="fw-bold">₹${itemTotal}</div>
                    </div>`;
            });
            document.getElementById('finalTotalDisplay').innerText = "₹" + total;
        }

        async function placeOrder() {
            const btn = document.getElementById('payBtn');
            btn.innerText = "Processing...";
            btn.disabled = true;

            try {                
                const checkoutPayload = {
                    customerId: parseInt(localStorage.getItem('userId')),
                    paymentMethod: document.getElementById('upi').checked ? "UPI/COD" : "Online",
                    items: cart.map(item => ({
                        menuId: item.id,
                        quantity: item.qty,
                        totalPrice: item.price * item.qty
                    }))
                };

                const response = await fetch('/api/Orders/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(checkoutPayload)
                });

                const result = await response.json();

                if (response.ok) {
                    localStorage.removeItem('cart'); 
                    alert("Payment Successful! " + result.message);
                    window.location.href = 'dashboard.html'; 
                } else {
                    alert("Checkout Failed: " + result.message);
                    btn.innerText = "Confirm Order & Pay";
                    btn.disabled = false;
                }

            } catch (error) {
                console.error(error);
                alert("Network error. Please try again.");
                btn.innerText = "Confirm Order & Pay";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
