<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Wallet - OotaBox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>if (!localStorage.getItem('userId')) window.location.href = '/index.html';</script>
</head>
<body class="bg-light pb-5">
    <nav class="navbar navbar-light bg-white shadow-sm mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <button class="btn btn-link text-dark text-decoration-none px-0" onclick="window.location.href='dashboard.html'">
                <i class="fa-solid fa-arrow-left me-1"></i> Back
            </button>
            <span class="navbar-brand fw-bold mx-auto">OotaBox Wallet</span>
            <button class="btn btn-sm btn-outline-danger fw-bold" onclick="localStorage.clear(); window.location.href='/index.html'">Logout</button>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;">
        <!-- Balance Card -->
        <div class="card border-0 shadow-sm rounded-4 mb-4 bg-dark text-white">
            <div class="card-body p-4 text-center">
                <p class="text-white-50 fw-bold mb-1">Available Balance</p>
                <h1 class="display-3 fw-bold mb-3" id="balanceDisplay">₹0.00</h1>

                <div class="d-flex justify-content-center gap-2 mb-3">
                    <button class="btn btn-outline-light rounded-pill px-4" onclick="setTopUpAmount(100)">+ ₹100</button>
                    <button class="btn btn-outline-light rounded-pill px-4" onclick="setTopUpAmount(500)">+ ₹500</button>
                    <button class="btn btn-outline-light rounded-pill px-4" onclick="setTopUpAmount(1000)">+ ₹1000</button>
                </div>

                <div class="input-group mb-2">
                    <span class="input-group-text bg-white border-0">₹</span>
                    <input type="number" id="topUpAmount" class="form-control border-0" placeholder="Enter Amount">
                    <button class="btn btn-danger fw-bold px-4" onclick="processTopUp()">Top Up</button>
                </div>
            </div>
        </div>

        <!-- Transaction History -->
        <h6 class="fw-bold mb-3 text-dark ps-2">Transaction History</h6>
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-0" id="transactionsList">
                <div class="p-4 text-center text-muted">Loading transactions...</div>
            </div>
        </div>
    </div>

    <script>
        const userId = localStorage.getItem('userId');

        async function loadWallet() {
            try {
                const response = await fetch(`/api/Wallets/${userId}`);
                if (!response.ok) throw new Error("Failed to load wallet.");
                const wallet = await response.json();

                document.getElementById('balanceDisplay').innerText = `₹${wallet.balance.toFixed(2)}`;
                renderTransactions(wallet.transactions);
            } catch (error) {
                console.error(error);
                document.getElementById('transactionsList').innerHTML = '<div class="p-4 text-center text-danger">Failed to load wallet data.</div>';
            }
        }

        function renderTransactions(transactions) {
            const list = document.getElementById('transactionsList');
            list.innerHTML = '';

            if (!transactions || transactions.length === 0) {
                list.innerHTML = '<div class="p-4 text-center text-muted"><i class="fa-solid fa-receipt fs-3 mb-2"></i><br>No transactions yet.</div>';
                return;
            }

            // Sort newest first
            transactions.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            transactions.forEach(tx => {
                const isCredit = tx.type === 'Credit';
                const color = isCredit ? 'text-success' : 'text-dark';
                const sign = isCredit ? '+' : '-';
                const icon = isCredit ? 'fa-arrow-down' : 'fa-arrow-up';
                const date = new Date(tx.timestamp).toLocaleString('en-IN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

                list.innerHTML += `
                        <div class="d-flex justify-content-between align-items-center p-3 border-bottom">
                            <div class="d-flex align-items-center">
                                <div class="bg-light rounded-circle p-2 me-3 text-center" style="width: 40px; height: 40px;">
                                    <i class="fa-solid ${icon} ${color} mt-1"></i>
                                </div>
                                <div>
                                    <h6 class="mb-0 fw-bold">${tx.description}</h6>
                                    <small class="text-muted">${date}</small>
                                </div>
                            </div>
                            <div class="fw-bold ${color} fs-5">${sign}₹${tx.amount.toFixed(2)}</div>
                        </div>`;
            });
        }

        function setTopUpAmount(amount) {
            document.getElementById('topUpAmount').value = amount;
        }

        async function processTopUp() {
            const amount = parseFloat(document.getElementById('topUpAmount').value);
            if (!amount || amount <= 0) return alert("Please enter a valid amount");

            const btn = event.target;
            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                const res = await fetch(`/api/Wallets/${userId}/topup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: amount })
                });

                const data = await res.json();
                if (res.ok) {
                    alert(data.message);
                    document.getElementById('topUpAmount').value = '';
                    loadWallet(); // Refresh UI
                } else {
                    alert(data.message || "Top-up failed");
                }
            } catch (err) {
                alert("Network error.");
            } finally {
                btn.innerText = "Top Up";
                btn.disabled = false;
            }
        }

        loadWallet();
    </script>
    <script src="/js/ootabot.js"></script>
</body>
</html>
