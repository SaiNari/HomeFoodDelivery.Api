<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Location - OotaBox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        if (!localStorage.getItem('userId')) window.location.href = '/index.html';
    </script>
</head>
<body style="background-color: #f8f9fa;">
    <nav class="navbar navbar-light bg-white shadow-sm position-absolute w-100 top-0">
        <div class="container">
            <span class="navbar-brand fw-bold text-danger">OotaBox</span>
            <button class="btn btn-sm btn-outline-danger" onclick="localStorage.clear(); window.location.href='/index.html'">Logout</button>
        </div>
    </nav>
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card p-5 shadow-lg border-0 text-center" style="width: 100%; max-width: 500px; border-radius: 20px;">
            <h2 class="fw-bold mb-3 text-dark">Where are you working today?</h2>
            <p class="text-muted mb-4">Select your corporate park to discover home kitchens delivering to your office.</p>

            <select id="techPark" class="form-select form-select-lg mb-4 text-center bg-light border-0 shadow-sm" style="height: 60px;">
                <option value="" disabled selected>-- Tap to choose your Tech Park --</option>
                <option value="Manyata">Manyata Tech Park</option>
                <option value="Whitefield">Whitefield ITPL</option>
                <option value="ElectronicCity">Electronic City</option>
                <option value="Bagmane">Bagmane Tech Park</option>
            </select>

            <button class="btn btn-dark btn-lg w-100 fw-bold shadow" style="height: 60px; border-radius: 10px;" onclick="saveContextAndProceed()">Find Food</button>
        </div>
    </div>
    <div class="container d-flex justify-content-center align-items-center min-vh-100">

        <script>
            function saveContextAndProceed() {
                const park = document.getElementById('techPark').value;
                if (!park) return alert("Please select a Tech Park to continue.");

                localStorage.setItem('userTechPark', park);
                window.location.href = 'kitchen-list.html';
            }
        </script>
</body>
</html>
