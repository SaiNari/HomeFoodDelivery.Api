<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Orders - OotaBox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-danger shadow-sm">
        <div class="container-fluid d-flex justify-content-between align-items-center">

            <button class="btn btn-sm btn-light fw-bold" onclick="window.location.href='kitchen-list.html'">
                Home
            </button>

            <span class="navbar-brand fw-bold mx-auto">My Orders</span>

            <div class="d-flex align-items-center gap-2">
                <a href="wallet.html" class="btn btn-sm btn-outline-light fw-bold">
                    <i class="fa-solid fa-wallet"></i> Wallet
                </a>
                <button class="btn btn-sm btn-outline-light fw-bold" onclick="localStorage.clear(); window.location.href='/index.html'">Logout</button>
            </div>

        </div>
    </nav>

    <div class="container mt-4">
        <h5>Serving: <span id="zoneName" class="text-danger"></span></h5>
        <div id="menuGrid" class="row mt-3 g-3">
            <p>Loading tasty food...</p>
        </div>
    </div>

    <div class="card p-4 shadow-sm mt-5">
        <h5>My Orders</h5>
        <table class="table">
            <thead>
                <tr>
                    <th>Dish</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="myOrdersBody">
            </tbody>
        </table>
    </div>

    <script>
        document.getElementById('zoneName').innerText = localStorage.getItem('zoneName');

        document.getElementById('zoneName').innerText = localStorage.getItem('zoneName');

        // 1. Load the Menus
        async function loadMenus() {
            try {
                const response = await fetch('/api/DailyMenus');
                const menus = await response.json();
                const grid = document.getElementById('menuGrid');

                grid.innerHTML = '';

                if (menus.length === 0) {
                    grid.innerHTML = '<p class="text-muted">No chefs have posted a menu yet. Check back soon!</p>';
                    return;
                }

                menus.forEach(menu => {
                    grid.innerHTML += `
                    <div class="col-12 col-md-6">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title">${menu.dishName}</h5>
                                <p class="card-text mb-1">Price: ₹${menu.pricePerPortion}</p>
                                <p class="card-text text-muted small">Portions Left: ${menu.availablePortions}</p>
                                <button class="btn btn-danger w-100" onclick="placeOrder(${menu.menuId}, ${menu.pricePerPortion})">Order Now</button>
                            </div>
                        </div>
                    </div>
                `;
                });
            } catch (err) {
                console.error("Error loading menus:", err);
            }
        }

        // 2. Place a quick order
        async function placeOrder(menuId, price) {
            const payload = {
                menuId: menuId,
                customerId: parseInt(localStorage.getItem('userId')),
                quantity: 1,
                totalPrice: price,
                orderStatus: "Pending",
                idempotencyKey: crypto.randomUUID()
            };

            const response = await fetch('/api/Orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("Order placed successfully! The chef will prepare it soon.");
                loadMyOrders();
                loadMenus();
            } else {
                const errorData = await response.json();
                alert("Failed to place order: " + (errorData.message || "Invalid data sent."));
            }
        }

        // 3. Load and Group the Customer's Order History
        async function loadMyOrders() {
            const customerId = localStorage.getItem('userId');
            const response = await fetch(`/api/Orders/customer/${customerId}`);
            const rawOrders = await response.json();
            const tableBody = document.getElementById('myOrdersBody');

            tableBody.innerHTML = '';

            if (rawOrders.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="3" class="text-center text-muted py-4">No orders placed yet. Time to eat!</td></tr>';
                return;
            }

            // Group the orders by Dish Name and Status
            const groupedOrders = [];
            rawOrders.forEach(order => {
                const dishName = order.dailyMenu?.dishName || 'Custom Dish';

                const existingGroup = groupedOrders.find(g => g.dishName === dishName && g.orderStatus === order.orderStatus);

                if (existingGroup) {
                    existingGroup.quantity += order.quantity;
                    existingGroup.totalPrice += order.totalPrice;
                    existingGroup.orderIds.push(order.orderId);
                } else {
                    groupedOrders.push({
                        ...order,
                        dishName: dishName,
                        orderIds: [order.orderId]
                    });
                }
            });

            // Render the grouped list
            groupedOrders.forEach(group => {
                let statusHtml = '';

                if (group.orderStatus === 'Pending') {
                    statusHtml = `
                    <div class="d-flex justify-content-between small mb-1">
                        <span class="text-warning fw-bold"><i class="fa-solid fa-fire-burner"></i> Cooking...</span>
                        <span class="text-muted">50%</span>
                    </div>
                    <div class="progress shadow-sm" style="height: 8px;">
                        <div class="progress-bar bg-warning progress-bar-striped progress-bar-animated" style="width: 50%"></div>
                    </div>`;
                } else if (group.orderStatus === 'Ready') {
                    statusHtml = `
                    <div class="d-flex justify-content-between small mb-1">
                        <span class="text-success fw-bold"><i class="fa-solid fa-bag-shopping"></i> Ready for Pickup</span>
                        <span class="text-success"><i class="fa-solid fa-check-circle"></i></span>
                    </div>
                    <div class="progress shadow-sm" style="height: 8px;">
                        <div class="progress-bar bg-success" style="width: 100%"></div>
                    </div>`;
                } else {
                    statusHtml = `<span class="badge bg-secondary">${group.orderStatus}</span>`;
                }

                const idDisplay = group.orderIds.map(id => '#' + id).join(', ');

                tableBody.innerHTML += `
                <tr class="align-middle">
                    <td class="fw-bold text-dark">
                        ${group.dishName} <br>
                        <small class="text-muted fw-normal">Orders: ${idDisplay}</small>
                    </td>
                    <td>
                        <span class="badge bg-light text-dark border shadow-sm px-3">
                            ${group.quantity}
                        </span>
                    </td>
                    <td class="text-muted fw-bold">₹${group.totalPrice}</td>
                    <td style="min-width: 160px;">
                        ${statusHtml}
                    </td>
                </tr>
            `;
            });
        }

        loadMenus();
        loadMyOrders();

        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/kitchenHub")
            .build();

        connection.on("OrderReceived", function () {
            console.log("🔔 Status update detected! Refreshing orders...");
            loadMyOrders();
        });

        connection.start()
            .then(function () {
                console.log("Customer live-updates connected.");
            })
            .catch(function (err) {
                console.error("SignalR Connection Error: ", err.toString());
            });

        connection.on("NewMenuAlert", function (alertData) {
            console.log("New Menu Alert Received!", alertData);

            // Simple UI Toast Notification
            const toastContainer = document.getElementById('toast-container') || createToastContainer();
            const toast = document.createElement('div');
            toast.className = 'alert alert-success shadow-sm fixed-top m-3';
            toast.style.zIndex = '10000';
            toast.innerHTML = `
        <strong><i class="fa-solid fa-bell"></i> New Menu!</strong><br>
        ${alertData.message}
        <button class="btn btn-sm btn-outline-success ms-3" onclick="window.location.href='menu.html'">View</button>
    `;
            document.body.appendChild(toast);

            // Auto-remove after 5 seconds
            setTimeout(() => toast.remove(), 5000);
        });

        function createToastContainer() {
            const div = document.createElement('div');
            div.id = 'toast-container';
            document.body.appendChild(div);
            return div;
        }
    </script>
    <script src="/js/ootabot.js"></script>
</body>
</html>
