<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menu - OotaBox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-danger">
        <div class="container-fluid">
            <span class="navbar-brand">🍱 Today's Menu</span>
            <button class="btn btn-sm btn-light" onclick="localStorage.clear(); window.location.href='/index.html'">Logout</button>
        </div>
    </nav>

    <div class="container mt-4">
        <h5>Serving: <span id="zoneName" class="text-danger"></span></h5>
        <div id="menuGrid" class="row mt-3 g-3">
            <p>Loading tasty food...</p>
        </div>
    </div>

    <div class="card p-4 shadow-sm mt-5">
        <h5>My Orders</h5>
        <table class="table">
            <thead>
                <tr>
                    <th>Dish</th>
                    <th>Price</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="myOrdersBody">
            </tbody>
        </table>
    </div>

    <script>
        document.getElementById('zoneName').innerText = localStorage.getItem('zoneName');

        async function loadMenus() {
            try {
                const response = await fetch('/api/DailyMenus');
                const menus = await response.json();
                const grid = document.getElementById('menuGrid');
                grid.innerHTML = '';

                if (menus.length === 0) {
                    grid.innerHTML = '<p class="text-muted">No chefs have posted a menu yet. Check back soon!</p>';
                    return;
                }

                menus.forEach(menu => {
                    grid.innerHTML += `
                                <div class="col-12 col-md-6">
                                    <div class="card shadow-sm">
                                        <div class="card-body">
                                            <h5 class="card-title">${menu.dishName}</h5>
                                            <p class="card-text mb-1">Price: ₹${menu.pricePerPortion}</p>
                                            <p class="card-text text-muted small">Portions Left: ${menu.availablePortions}</p>
                                            <button class="btn btn-danger w-100" onclick="placeOrder(${menu.menuId}, ${menu.pricePerPortion})">Order Now</button>
                                        </div>
                                    </div>
                                </div>
                            `;
                });
            } catch (err) {
                console.error("Error loading menus:", err);
            }
        }
        async function placeOrder(menuId, price) {
            const payload = {
                menuId: menuId,
                customerId: parseInt(localStorage.getItem('userId')),
                quantity: 1, // Added: Required in Order.cs
                totalPrice: price, // Changed: Must match Order.cs property
                orderStatus: "Pending", // Changed: Must match Order.cs property
                idempotencyKey: crypto.randomUUID() // Added: Required GUID to prevent duplicate orders
            };

            console.log("Sending payload:", payload); // Check this in F12 console

            const response = await fetch('/api/Orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("Order placed successfully! The chef will prepare it soon.");
            } else {
                // This will now show you the specific validation error from .NET
                const errorData = await response.json();
                console.error("Server Error Details:", errorData);
                alert("Failed to place order: " + (errorData.message || "Invalid data sent."));
            }
        }

        loadMenus();

        async function loadMyOrders() {
            const customerId = localStorage.getItem('userId');
            const response = await fetch(`/api/Orders/customer/${customerId}`);
            const orders = await response.json();

            const tableBody = document.getElementById('myOrdersBody');
            tableBody.innerHTML = '';

            orders.forEach(order => {
                tableBody.innerHTML += `
            <tr>
                <td>${order.dailyMenu?.dishName || 'N/A'}</td>
                <td>₹${order.totalPrice}</td>
                <td>
                    <span class="badge ${order.orderStatus === 'Ready' ? 'bg-success' : 'bg-warning'}">
                        ${order.orderStatus}
                    </span>
                </td>
            </tr>
        `;
            });
        }

        // Call this function when the page loads
        loadMyOrders();
    </script>
</body>
</html>
