<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - HomeFood Delivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .auth-container {
            max-width: 420px;
            margin: auto;
            min-height: 100vh;
            background: #ffffff;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        .brand-header {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            padding: 3rem 1.5rem;
            text-align: center;
            border-radius: 0 0 25px 25px;
        }

        .nav-pills .nav-link.active {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
        }

        .nav-pills .nav-link {
            color: #555;
            fw-bold;
        }
    </style>
</head>
<body>

    <div class="auth-container d-flex flex-column justify-content-between">
        <div>
            <div class="brand-header mb-4">
                <h1 class="fw-bold">🍱 OotaBox</h1>
                <p class="mb-0">Authentic Home Cooked Food for Bangalore Tech Parks</p>
            </div>

            <div class="px-4">
                <ul class="nav nav-pills nav-justified mb-4" id="authTabs" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#loginSection" type="button">Login</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#registerSection" type="button">Register</button>
                    </li>
                </ul>

                <div class="tab-content">
                    <div class="tab-pane fade show active" id="loginSection">
                        <form id="loginForm" onsubmit="handleLogin(event)">
                            <div class="mb-3">
                                <label class="form-label text-muted small uppercase">Phone Number</label>
                                <input type="tel" id="loginPhone" class="form-control form-control-lg" placeholder="Enter your 10-digit number" required>
                            </div>
                            <button type="submit" class="btn btn-danger btn-lg w-100 mt-2" style="background: linear-gradient(135deg, #ff416c, #ff4b2b); border:none;">Let's Eat 🚀</button>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="registerSection">
                        <form id="registerForm" onsubmit="handleRegister(event)">
                            <div class="mb-3">
                                <label class="form-label text-muted small">I want to:</label>
                                <select id="regRole" class="form-select" onchange="toggleCookFields()" required>
                                    <option value="Customer">Order Delicious Home Food (Customer)</option>
                                    <option value="Cook">Cook & Earn from Home (Home Chef)</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small">Full Name</label>
                                <input type="text" id="regName" class="form-control" placeholder="Your Name" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small">Phone Number</label>
                                <input type="tel" id="regPhone" class="form-control" placeholder="10-digit mobile number" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small">Select Your Primary Tech Park Workspace</label>
                                <select id="regZone" class="form-select" required>
                                </select>
                            </div>
                            <div class="mb-3 d-none" id="kitchenField">
                                <label class="form-label text-muted small">Kitchen or Home Address Details</label>
                                <input type="text" id="regAddress" class="form-control" placeholder="Flat No, Apartment Near Tech Park">
                            </div>
                            <button type="submit" class="btn btn-danger btn-lg w-100 mt-3" style="background: linear-gradient(135deg, #ff416c, #ff4b2b); border:none;">Create Account 🎉</button>
                        </form>
                    </div>
                </div>

                <div id="alertMessage" class="mt-3 text-center fw-bold small"></div>
            </div>
        </div>

        <div class="text-center py-3 text-muted small border-top bg-light">
            Secure Role-Based Ecosystem Enabled
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const API_BASE_URL = '/api';

        // 1. Fetch Master Tech Parks list from API on Page Load
        async function loadTechParks() {
            try {
                const response = await fetch(`${API_BASE_URL}/DeliveryZones`);
                const zones = await response.json();
                const zoneSelect = document.getElementById('regZone');
                zoneSelect.innerHTML = '';

                zones.forEach(zone => {
                    zoneSelect.innerHTML += `<option value="${zone.zoneId}">${zone.techParkName} (${zone.servicingNeighborhoods})</option>`;
                });
            } catch (error) {
                console.error("Failed to load tech parks", error);
            }
        }

        // Show kitchen address field ONLY if the user selects the Cook role
        function toggleCookFields() {
            const role = document.getElementById('regRole').value;
            const kitchenField = document.getElementById('kitchenField');
            if (role === 'Cook') {
                kitchenField.classList.remove('d-none');
            } else {
                kitchenField.classList.add('d-none');
            }
        }

        // 2. Handle Account Registration
        async function handleRegister(e) {
            e.preventDefault();
            showAlert('', '');

            const payload = {
                fullName: document.getElementById('regName').value,
                phoneNumber: document.getElementById('regPhone').value,
                userRole: document.getElementById('regRole').value,
                addressText: document.getElementById('regAddress').value || "Tech Park Hub",
                zoneId: parseInt(document.getElementById('regZone').value)
            };

            const response = await fetch(`${API_BASE_URL}/Auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok) {
                showAlert('success', 'Registration successful! Switching to login tab...');
                setTimeout(() => {
                    document.getElementById('login-tab').click();
                    document.getElementById('loginPhone').value = payload.phoneNumber;
                }, 1500);
            } else {
                showAlert('danger', data.message || 'Registration failed.');
            }
        }

        // 3. Handle Account Login & Smart Role Routing
        async function handleLogin(e) {
            e.preventDefault();
            showAlert('', '');

            const payload = {
                phoneNumber: document.getElementById('loginPhone').value
            };

            const response = await fetch(`${API_BASE_URL}/Auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok) {
                showAlert('success', `Welcome back, ${data.fullName}! Redirecting...`);

                // Save session info inside browser storage so dashboards can read it!
                localStorage.setItem('userId', data.userId);
                localStorage.setItem('fullName', data.fullName);
                localStorage.setItem('userRole', data.role);
                localStorage.setItem('zoneId', data.zoneId);
                localStorage.setItem('zoneName', data.zoneName);

                // THE SMART REDIRECT MATRIX
                setTimeout(() => {
                    if (data.role === 'Cook') {
                        window.location.href = '/cook/dashboard.html';
                    } else {
                        window.location.href = '/customer/dashboard.html';
                    }
                }, 1000);
            } else {
                showAlert('danger', data.message || 'Login failed.');
            }
        }

        function showAlert(type, text) {
            const msg = document.getElementById('alertMessage');
            msg.className = `mt-3 text-center fw-bold small text-${type}`;
            msg.innerText = text;
        }

        // Initialize Tech Park layout on mount
        loadTechParks();
    </script>
</body>
</html>
